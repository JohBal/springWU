<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/interactions.css">
  <link rel="stylesheet" href="./css/shared.css">
  <link rel="stylesheet" href="./css/status.css">
  <title>Interactions</title>
</head>
<body>
  <div id="wrapper">
    <header>
      <div class="header-container flex-row space-between">
        <input type="checkbox" class="mobile-menu-btn custom" title="Menu button">
        <div class="header-left center relative">
          <h1>Standard model of particle physics</h1>
          <!-- <h1 class="text-shadow" aria-hidden="true">Standard model of particle physics</h1> -->
        </div>
        <nav class="header-right flex-col">
          <ul class="nav-list">
            <li><a href="./index.html" class="text-center">Table</a></li>
            <li><a href="./hardrons.html" class="text-center">Hardrons</a></li>
            <li><a href="./interactions.html" class="text-center">Interactions</a></li>
            <li><a href="./about.html" class="text-center">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div id="current-site">
      <h2>The interactions</h2>
    </div>

    <aside class="side-panel-container">
      <hr>
      <div class="side-panel">
        <h2 class="list-space title">Options</h2>
        <form class="side-panel-form">
          <label name="anti-pair">Anti-pair</label>
          <input name="anti-pair" type="checkbox" class="checkbox"></input>
        </form>
      </div>
      <hr>
    </aside>

    <section class="particles round-border">
      <div class="table-container">
        <div class="upper-bar">
          <div class="col-hd">
            <p>Gen 1</p>
            <p>Gen 2</p>
            <p>Gen 3</p>
          </div>
          <div class="legand">
            <ul class="hide-scroll flex-row">
              <li>
                <p>Legend</p>
              </li>

              <li class="">
                <input type="checkbox">
                <input type="checkbox">
                <input type="checkbox">
              </li>

              <li class="">
                <input type="checkbox">
                <input type="checkbox">
                <input type="checkbox">
              </li>
            </ul>
            <span class="scroll-marker flex-row flex-center gap-small">
              <span class="aspect-height"></span>
              <span class="aspect-height"></span>
              <span class="aspect-height"></span>
            </span>
          </div>
        </div>

        <div class="background">

        </div>
  
        <div class="table">

          <template id="tableEntry">
            <div class="entry">
              <div class="particle center round-border" role="cell" tabindex="0">
                <ul class="particle-data-list ign-point">
                  <li><label>Mass</label> <output>100</output> <abbr title="Electron volt">ev</abbr></li>
                  <li><label>Spin</label> <output>1/2</output></li>
                  <li><label>E</label> <output>100</output> <abbr title="Joule">J</abbr></li>
                </ul>

                <div class="center">
                  <div class="circle aspect-height">
                    <h3 class="center-abs particle-addr">U</h3>
                  </div>
                </div>
                <h3 class="particle-name">UP</h3>
              </div>
            </div>
          </template>

        </div>
      </div>
    </section>

    <section class="particle-details-container round-border">
      <div class="details-header flex-row">
        <h2>Details</h2>
        <!-- <div class="options flex-row flex-wrap">
          <button>Compare</button>
          <button disabled>Interaction</button>
        </div> -->
      </div>

      <div class="particle-details flex-row flex-stretch gap-small">
        <section>
          <div class="details-list-header list-space-2">

            <div class="flex-row gap-small">

              <h3 class="list-space-2">Particle</h3>
              <svg class="aspect-height" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="50" cy="50" r="50" />
                  <text x="0" y="0" lengthAdjust="spacing" textLength="100">U</text>
              </svg>

              <div class="options center">
                <p>Drag here</p>
              </div>
            </div>

            <hr class="list-space-2">

          </div>

          <canvas class="interactions-container round-border">

          </canvas>

        </section> 
      </div>
    </section>

    <footer class="flex-col">
      <div class="footer-list gap-small">
        <section class="round-border">
          <h2>About</h2>
          <ul class="list-col">
            <li></li>
          </ul>
        </section>
        <section class="round-border">
          <h2>Other scientific websites</h2>
          <ul class="list-col">
            <li><a>Website 1</a></li>
            <li><a>Website 22222222</a></li>
          </ul>
        </section>
        <section class="round-border">
          <h2>Social & contact</h2>
          <ul class="grid-collage">
            <li class="social"><a><img width="50" height="50"></a></li>
            <li class="contact"><a>Mail</a></li>
            <li></li>
          </ul>
        </section>
      </div>
      <div class="bottom flex-row">
        <p>Copyright text</p>
        <span></span>
      </div>
    </footer>
  </div>
  <script src="./js/table.js"></script>
</body>
</html>
